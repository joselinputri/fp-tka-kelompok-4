---
- name: Setup Nginx Load Balancer
  hosts: frontend_servers
  become: yes

  tasks:

    - name: Install nginx
      apt:
        name: nginx
        state: present
        update_cache: yes


    - name: Configure nginx
      copy:
        dest: /etc/nginx/sites-available/default
        content: |

          upstream backend {
              least_conn;

              server 10.184.0.3:5000;
              server 10.184.0.4:5000;
              server 10.184.0.5:5000;
          }


          server {

              listen 80;


              location / {

                  root /var/www/html;
                  index index.html;

              }


              location /api/ {

                  proxy_pass http://backend;

              }
          }


    - name: Restart nginx
      systemd:
        name: nginx
        state: restarted